set -g mouse on
setw -g mode-keys vi

# Colors & truecolor
set -g default-terminal "screen-256color"
set -as terminal-overrides ',xterm-256color:RGB,screen-256color:RGB,tmux-256color:RGB'
set -g renumber-windows on

# Enable UTF-8 and 256-color
set -g utf8 on
set -g status-utf8 on   # legacy, harmless if ignored
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',xterm-256color:RGB'


# Splits
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Copy-mode (vi)
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy 2>/dev/null || xclip -sel clip 2>/dev/null || wl-copy 2>/dev/null || cat >/dev/null"

